name: Generate Trophy

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate trophy image
        uses: ryo-ma/github-profile-trophy@v1.1.0
        with:
          username: Abdul-Hadi-del
          theme: tokyonight
          column: 7
          no-frame: true
          no-bg: true
          output: trophy-images/github-trophy.svg

      - name: Push to output-trophy branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output-trophy
          build_dir: trophy-images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
