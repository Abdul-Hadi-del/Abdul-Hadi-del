name: Generate Trophy

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Abdul-Hadi-del
          output_path: trophy-images/github-trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output-trophy branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output-trophy
          build_dir: trophy-images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
